<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IlmHub • Profil</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="nav">
        <div class="container nav__inner">
            <div class="brand">
                <span style="width:36px;height:36px;border-radius:14px;display:inline-grid;place-items:center;
                   background:linear-gradient(135deg, rgba(76,201,240,.25), rgba(124,77,255,.25));
                   border:1px solid var(--border);">IH</span>
                <div>
                    <div>IlmHub</div>
                    <div class="badge">Profil</div>
                </div>
            </div>

            <div class="nav__links">
                <a href="index.html">Start</a>
                <a href="courses.html">Kurse</a>
                <a href="posts.html">Beiträge</a>
                <a href="worksheets.html">Lernblätter</a>
            </div>

            <div class="btnRow">
                <span class="badge">👤 <span id="userLabel">Gast</span></span>
                <button class="btn" id="btnLogin">Mit Google einloggen</button>
                <button class="btn btn--ghost" id="btnLogout" style="display:none">Logout</button>
            </div>
        </div>
    </div>

    <div class="container">
        <h1 class="h1">Dein Profil</h1>

        <div class="grid grid--2">
            <div class="card">
                <h3>Name</h3>
                <p id="pName" class="p">-</p>
            </div>

            <div class="card">
                <h3>E-Mail</h3>
                <p id="pEmail" class="p">-</p>
            </div>
        </div>

        <div class="card" style="margin-top:16px">
            <h3>Status</h3>
            <p id="pState" class="p">-</p>
            <div class="small">Speicherorte: users/{uid}/progress & users/{uid}/worksheets</div>
        </div>

        <div class="footer">Später: Übersicht über deine Kurse, Lernblätter, Abzeichen.</div>
    </div>

    <script type="module">
  import { mountNav, renderProfile } from "./app.js";
  mountNav();
  renderProfile();
    </script>
</body>
</html>
